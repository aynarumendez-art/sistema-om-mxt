<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sistema O&M — MXT Holdings</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter","Segoe UI",sans-serif;background:#F4F6F8;color:#1F2933;height:100vh;overflow:hidden}
:root{
--navy:#071827;--blue:#173B63;--deep:#0B2742;
--cyan:#00AEEF;--yellow:#F5A800;
--gray:#F4F6F8;--border:#D9DEE7;--muted:#667085;--dark:#1F2933;
--success:#2E7D32;--warn:#F5A800;--info:#0077C8;--danger:#C62828;--neutral:#6B7280;
}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.sb-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px}
.sb-logo-icon{background:var(--blue);border-radius:8px;padding:7px;display:flex}
.sb-nav{flex:1;padding:10px 6px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:8px;background:transparent;color:#94A3B8;font-size:13px;font-weight:400;transition:all .15s;margin-bottom:1px}
.sb-item.active{background:var(--blue);color:#fff;font-weight:600}
.sb-item:hover:not(.active){background:rgba(255,255,255,.06);color:#CBD5E1}
.sb-user{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08)}
.sb-user-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.avatar{width:30px;height:30px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;flex-shrink:0}
.sb-name{color:#fff;font-size:12px;font-weight:600;line-height:1.2}
.sb-role{color:#94A3B8;font-size:10px}
.logout-btn{display:flex;align-items:center;gap:5px;color:#94A3B8;background:none;border:none;font-size:12px;cursor:pointer;padding:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-header{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:17px;font-weight:700;color:var(--dark)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary{background:var(--blue);color:#fff;border:none}
.btn-secondary{background:#fff;color:var(--blue);border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff;border:none}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.sema{width:11px;height:11px;border-radius:50%;display:inline-block;flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:14px}
.kpi-icon{border-radius:8px;padding:9px;flex-shrink:0;display:flex}
.kpi-val{font-size:28px;font-weight:700;color:var(--dark);line-height:1}
.kpi-lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:2px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid var(--border)}
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px}
.filters{padding:10px 24px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:9px;top:8px;color:var(--muted);pointer-events:none}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:8px;font-size:13px}
.filter-sel{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;min-width:130px;background:#fff}
.tbl-wrap{flex:1;overflow-y:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead tr{position:sticky;top:0;z-index:1}
.tbl thead th{background:var(--deep);color:#fff;padding:9px 11px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap}
.tbl tbody tr{border-bottom:1px solid #F1F3F5}

.tbl td{padding:7px 11px;color:var(--dark)}
.tbl td.snum{color:var(--muted);font-size:11px}
.tbl td.bold{font-weight:600;color:var(--blue)}
.modal-bg{position:fixed;inset:0;background:rgba(7,24,39,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:500px;max-width:100%;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 48px rgba(0,0,0,.2)}
.modal-wide{width:800px}
.modal-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-head h3{font-size:15px;font-weight:700;color:var(--dark)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--dark);margin-bottom:3px}
.field label .req{color:var(--danger)}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--dark);background:#fff}
.field textarea{height:72px;resize:vertical}
.field input:disabled,.field select:disabled,.field textarea:disabled{background:#F9FAFB;color:var(--muted)}
.tabs{display:flex;gap:0;padding:0 24px;background:#fff;border-bottom:1px solid var(--border)}
.tab{padding:11px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--muted);font-weight:400;border-bottom:2px solid transparent}
.tab.active{color:var(--blue);font-weight:700;border-bottom-color:var(--blue)}
.detail-header{background:var(--deep);padding:14px 24px;color:#fff;flex-shrink:0}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.detail-item .dl{font-size:11px;color:var(--muted);margin-bottom:1px}
.detail-item .dv{font-size:14px;font-weight:600;color:var(--dark)}
.login-wrap{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:16px;padding:28px;width:380px;max-width:calc(100vw - 32px);box-shadow:0 24px 48px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-brand{background:var(--blue);border-radius:10px;display:inline-flex;align-items:center;gap:8px;padding:10px 16px;margin-bottom:12px}
.err{background:#FDECEC;color:var(--danger);padding:7px 10px;border-radius:8px;font-size:12px;margin-bottom:10px}
.loader{width:calc(100% - 220px);height:2px;background:var(--cyan);position:fixed;top:0;right:0;z-index:200}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px;margin-top:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.bar-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;margin-top:auto}
.bar-lbl{font-size:9px;color:var(--muted);text-align:center;margin-top:3px;line-height:1.2}
.pie-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tipo-tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.back-btn{display:flex;align-items:center;gap:5px;color:#94A3B8;background:none;border:none;cursor:pointer;font-size:12px;margin-bottom:10px}
.stat-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.stat-chip{background:rgba(255,255,255,.1);border-radius:6px;padding:5px 10px;font-size:11px;color:#CBD5E1}

.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2)}
</style>

function getCondicion(p){

function fld(label,type,value,onChange,opts){
  const wrap=h("div",{class:"field"});
  if(label){const lb=h("label",{},label);if(opts?.required){lb.appendChild(h("span",{class:"req"},"*"));}wrap.appendChild(lb);}
  let el;
  if(opts?.options){
    el=h("select");el.value=value||"";el.appendChild(h("option",{value:""},"Seleccionar..."));
    opts.options.forEach(o=>{const op=h("option",{value:o.value??o},o.label??o);if((o.value??o)===(value||""))op.selected=true;el.appendChild(op);});
    el.onchange=e=>onChange(e.target.value);
  }else if(type==="textarea"){el=h("textarea");el.value=value||"";el.oninput=e=>onChange(e.target.value);}
  else{el=h("input",{type:type||"text"});el.value=value||"";el.oninput=e=>onChange(e.target.value);if(opts?.placeholder)el.placeholder=opts.placeholder;}
  if(opts?.disabled)el.disabled=true;

async function loadData(){

      db.get("trx_obras",tk,"order=nombre_sitio.asc"),
      db.get("trx_pendientes",tk,"activo=eq.true&order=fecha_compromiso.asc.nullslast"),
      db.get("cat_sitios",tk,"activo=eq.true&order=name.asc&limit=200"),
      db.get("cat_clientes",tk,"activo=eq.true"),
      db.get("cat_aliados",tk,"activo=eq.true"),
      db.get("cat_tipos_obra",tk,"activo=eq.true"),
    ]);
    state.obras=o||[];state.pendientes=p||[];state.sitios=s||[];
    state.clientes=c||[];state.aliados=a||[];state.tiposObra=t||[];
  }catch(e){showToast("Error cargando datos: "+e.message,"error");}
  state.loading=false;render();
}

  const main=h("div",{class:"main"});
  if(state.selectedObraId&&state.view==="tracker"){main.appendChild(renderDetalleObra());}
  else{switch(state.view){case"dashboard":main.appendChild(renderDashboard());break;case"tracker":main.appendChild(renderTracker());break;case"pendientes":main.appendChild(renderPendientes());break;case"sitios":main.appendChild(renderSitios());break;case"bitacora":main.appendChild(renderBitacora());break;case"catalogos":main.appendChild(renderCatalogos());break;default:main.appendChild(renderDashboard());}}
  app.appendChild(main);root.appendChild(app);
}
render();
</script>
</body>
</html>
